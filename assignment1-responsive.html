<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css"
      integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      .menu a {
        text-decoration: none;
        color: black;
      }
    </style>
  </head>
  <body
    class="vh-100 bg-light d-flex justify-content-center align-items-center">
    <div
      class="container bg-white shadow-lg"
     style="width:80%;height:400px;"
    >
      <!-- for menu -->
      <div
        class="menu d-flex justify-content-end gap-3 flex-column flex-md-row text-center"
      >
        <div class="vector mt-3"><a href>Vector</a></div>
        <div class="illustrations mt-3"><a href>Illustration</a></div>
        <div class="images mt-3"><a href>images</a></div>
        <div class="icons mt-3 me-3"><a href>icons</a></div>
      </div>
      <!-- For search and upload -->
      <div
        class="menu2 d-flex justify-content-between mt-3 flex-column flex-md-row"
      >
        <div class="search">
          <input
            type="text"
            class="border-0 border-bottom shadow-none"
            placeholder="Search"
          />
          <button class="border-0 bg-white">
            <i class="ri-search-line"></i>
          </button>
        </div>
        <div class="upload mt-3 mt-md-0 d-grid">
          <button class="btn btn-dark" type="button">upload</button>
        </div>
      </div>

      <!-- for adding images -->

      <div class="images" >
        <div class="imagecon row mt-3 " >
          <div class="img1 col-12 col-md-4 col-lg-2 g-2" >
            <img class="img-fluid" src="/image1.jpg" />
          </div>
          <div class="img1 col-12 col-md-4 col-lg-2 g-2" >
            <img class="img-fluid" src="/image2.jpg" />
          </div>
          <div class="img1 col-12 col-md-4 col-lg-2 g-2" >
            <img class="img-fluid" src="/image3.jpg" />
          </div>
          <div class="img1 col-12 col-md-4 col-lg-2 g-2" >
            <img class="img-fluid" src="/image4.jpg" />
          </div>
          <div class="img1 col-12 col-md-4 col-lg-2 g-2" >
            <img class="img-fluid" src="/image5.jpg" />
          </div>
          <div class="img1 col-12 col-md-4 col-lg-2 g-2" >
            <img class="img-fluid" src="/image6.jpg" />
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
