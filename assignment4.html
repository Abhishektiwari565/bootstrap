<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    
    
  </head>
  <body
    style="background-color: rgb(218, 214, 214)"
    class="min-vh-100 d-flex justify-content-center align-items-center"
  >
    <div class="container bg-white shadow-lg"style="max-width:900px">
      <div class="row">
        <div class="image col-md-4 col-12 ">
          <img class="m-0 p-0 img-fluid m-md-5 " src="/headphone.png" />
        </div>
        <div class="content col-md-8 col-12">
          <div class="contentkeep m-5 text-center text-md-start">
            <span class="bg-dark text-white badge"> Free shipping</span>

            <h3 class="mt-2">Razer Kraken kitty Edt Gaming Headset Quartz</h3>

            <h6 class="text-decoration-line-through fw-light">$799</h6>
            <h1 class="fw-bold mt-2">$599</h1>
            <p class="fw-light">
              This offer is valid until April 3rd or as long as strong lasts!
            </p>
            <button class="btn btn-primary w-100 p-3 ">Add to cart</button>
            
            <h6 class="mt-2">50+ pcs.in stock</h6>
          <div class="btnkeeper w-100 row gap-2 flex-column flex-md-row">
            <button class="btn btn-white border col ">
              <img
                style="height: 30px; width: 30px"
                class="img-fluid"
                src="/weight.png"
              />
              Add to cart
            </button>

            <button class="btn btn-white border col ">
              <img
                style="height: 30px; width: 30px; background-color: white;"
                class="img-fluid"
                src="/heart.png"
              />
              Add to Wishlist
            </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
